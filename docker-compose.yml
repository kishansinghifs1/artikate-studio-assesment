version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: artikate_db
    restart: always
    environment:
      POSTGRES_DB: artikate_db
      POSTGRES_USER: artikate_user
      POSTGRES_PASSWORD: artikate_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: artikate_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
